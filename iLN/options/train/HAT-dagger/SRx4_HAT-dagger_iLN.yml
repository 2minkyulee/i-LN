# general settings
name: SRx4_HAT-dagger_iLN
model_type: HATModel
scale: 4
num_gpu: 8
manual_seed: 1

# dataset and data loader settings
datasets:
  train:
    name: DF2K
    type: PairedImageDataset
    dataroot_gt: YOUR_PATH/sr_dataset_fp64_mod234/DF2K/HRmod4_sub
    dataroot_lq: YOUR_PATH/sr_dataset_fp64_mod234/DF2K/LRfp64x4_sub
    io_backend:
      type: disk

    gt_size: 256
    use_hflip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 6
    batch_size_per_gpu: 4
    dataset_enlarge_ratio: 100
    prefetch_mode: ~
    pin_memory: true

  val:
    name: Set5
    type: PairedImageDataset
    dataroot_gt: YOUR_PATH/sr_dataset_fp64_mod234/Set5/HRmod4
    dataroot_lq: YOUR_PATH/sr_dataset_fp64_mod234/Set5/LRfp64x4
    io_backend:
      type: disk

  val_2:
    name: Urban100
    type: PairedImageDataset
    dataroot_gt: YOUR_PATH/sr_dataset_fp64_mod234/Urban100/HRmod4
    dataroot_lq: YOUR_PATH/sr_dataset_fp64_mod234/Urban100/LRfp64x4
    io_backend:
      type: disk

  val_3:
    name: Manga109
    type: PairedImageDataset
    dataroot_gt: YOUR_PATH/sr_dataset_fp64_mod234/Manga109/HRmod4
    dataroot_lq: YOUR_PATH/sr_dataset_fp64_mod234/Manga109/LRfp64x4
    io_backend:
      type: disk



network_g:
  type: HAT-iLN
  upscale: 4
  in_chans: 3
  img_size: 64
  window_size: 16
  compress_ratio: 3
  squeeze_factor: 30
  conv_scale: 0.01
  overlap_ratio: 0.5
  img_range: 1.
  depths: [6, 6, 6, 6, 6, 6]
  embed_dim: 180
  num_heads: [6, 6, 6, 6, 6, 6]
  mlp_ratio: 2
  upsampler: 'pixelshuffle'
  resi_connection: '1conv'
  stdnorm: True


# path
path:
  pretrain_network_g: YOUR_SRx2_PRETRAINED_MODEL
  param_key_g: 'params_ema'
  strict_load_g: False
  resume_state: ~


# training settings
train:
  ema_decay: 0.999
  optim_g:
    type: Adam
    lr: !!float 1e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [125000, 200000, 225000, 240000]
    gamma: 0.5



  total_iter: 250000
  warmup_iter: -1  # no warm up

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

# validation settings
val:
  val_freq: !!float 1e4
  save_img: false
  pbar: False

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 4
      test_y_channel: true
      better: higher  # the higher, the better. Default: higher
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: true
      better: higher  # the higher, the better. Default: higher


# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 1e4
  use_tb_logger: true
  wandb:
    project: _tmp_ICLR2026_deploy
    resume_id: ~


# dist training settings
dist_params:
  backend: nccl
  port: 29500

